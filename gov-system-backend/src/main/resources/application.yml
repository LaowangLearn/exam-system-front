server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: gov-affairs-platform
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:govdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

gov:
  gm-enabled: true
  ai-enabled: true
  ai-model-provider: local
  data-path: /data/gov
  file-path: /data/gov/files
  password-expire-days: 90
  max-login-fail-count: 5
  login-fail-lock-minutes: 30

logging:
  level:
    com.gov.affairs: DEBUG
